<!DOCTYPE html>
<!--
  TC · 달항아리 (The Moon Jar) — fused animation study
  ─────────────────────────────────────────────────────────────────────────────
  Extracted & merged from two sources, re-expressed as a white-porcelain moon jar:

    • TC_captojar.html            → moon-jar profile, rebuilt as a smooth
                                    lathed moon-jar ↔ pill morph
    • TC_Original_mainpage_v1.html → 8 drifting R/B/Y glowing orbs
                                    (golden-ratio organic drift φ=0.618…)
                                    rewritten from Three.js → pure Canvas-2D

  Zero dependencies. Works offline on file://.  The vessel = Layer A (the form);
  the glowing orbs within = Layer B (the genesis it carries).
  ─────────────────────────────────────────────────────────────────────────────
-->
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>달항아리 · The Moon Jar — TC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Noto+Serif+KR:wght@200;500;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#08080b}
  #c{position:fixed;inset:0;z-index:1;display:block}
  .vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at 50% 46%,transparent 38%,rgba(8,8,11,.92) 90%)}
  .ui{position:fixed;inset:0;z-index:3;pointer-events:none;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;padding-bottom:7vh;text-align:center}
  .title{font-family:'Noto Serif KR';font-weight:200;font-size:clamp(1.3rem,4vw,2.6rem);
    color:rgba(244,239,230,.94);letter-spacing:.05em;line-height:1.4;text-shadow:0 2px 50px rgba(0,0,0,.8)}
  .title b{font-weight:900;color:#f0d49a}
  .sub{font-family:'Inter';font-weight:300;font-size:.82rem;color:rgba(230,224,210,.42);
    margin-top:13px;max-width:520px;line-height:1.7}
  .tag{position:fixed;top:7vh;left:50%;transform:translateX(-50%);z-index:4;pointer-events:none;
    font-family:'JetBrains Mono';font-size:.6rem;letter-spacing:.42em;text-transform:uppercase;
    color:rgba(240,212,154,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="tag">白磁 · MOON JAR · 達航아리</div>
<div class="ui">
  <div class="title">비우면, 비로소 <b>채워진다.</b></div>
  <div class="sub">백자 달항아리는 형(形)을 담고, 그 안의 빛은 기원(起源)을 담는다.<br>The vessel holds the form; the light within holds its genesis.</div>
</div>
<script>
const c = document.getElementById('c'), x = c.getContext('2d');
let W, H, CX, CY, S, DPR = Math.min(devicePixelRatio, 2);
function resize(){
  W = innerWidth; H = innerHeight; CX = W/2; CY = H*0.45;
  S = Math.min(W, H) * 0.30;
  c.width = W*DPR; c.height = H*DPR; c.style.width = W+'px'; c.style.height = H+'px';
  x.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize(); addEventListener('resize', resize);

const HALF_H = 1.76; // total jar height factor (in S units)
const TAU = Math.PI * 2;
const clamp01 = v => Math.max(0, Math.min(1, v));
const lerp = (a, b, p) => a + (b - a) * p;
function smoothstep(a, b, v){
  const p = clamp01((v - a) / (b - a));
  return p * p * (3 - 2 * p);
}
function smootherstep(a, b, v){
  const p = clamp01((v - a) / (b - a));
  return p * p * p * (p * (p * 6 - 15) + 10);
}

/* ── Smooth lathe profiles: moon jar ↔ pill, both made from curves only ──
   u: 0 bottom .. 1 top ; returns normalized half-width radius              */
function moonR(u){
  u = clamp01(u);
  const sphere = Math.pow(Math.sin(Math.PI * u), 0.30);
  let r = 0.115 + 0.575 * sphere;

  // Round closed base, full belly, then a quiet shoulder into a small mouth.
  r = lerp(0.128, r, smootherstep(0.00, 0.19, u));
  r *= 1 - 0.105 * smootherstep(0.58, 0.88, u);
  r = lerp(r, 0.212, smootherstep(0.82, 0.985, u));

  // Very soft lip flare, not a kink.
  const lip = Math.exp(-Math.pow((u - 0.945) / 0.050, 2));
  r += 0.022 * lip;
  return Math.max(0.105, r);
}
function capsuleR(u){
  const y = (u - 0.5) * HALF_H;
  const radius = 0.43;
  const halfStraight = HALF_H / 2 - radius;
  const d = Math.abs(y);
  if (d <= halfStraight) return radius;
  const capY = (d - halfStraight) / radius;
  return radius * Math.sqrt(Math.max(0, 1 - capY * capY));
}
function jarAmount(t){
  const cycle = (t % 11.5) / 11.5;
  const intoJar = smootherstep(0.12, 0.45, cycle);
  const backToCapsule = 1 - smootherstep(0.72, 0.94, cycle);
  return intoJar * backToCapsule;
}
function currentR(u, t){
  const j = jarAmount(t);
  let r = lerp(capsuleR(u), moonR(u), j);
  const bottomZone = 1 - smoothstep(0.00, 0.12, u);
  const bottomRound = smoothstep(0.02, 0.16, j);
  const roundFloor = 0.112 + 0.075 * smoothstep(0.00, 0.10, u);
  r = lerp(r, Math.max(r, roundFloor), bottomZone * bottomRound);
  return r;
}
function jarY(u, t){
  const j = jarAmount(t);
  return CY + (0.5 - u) * HALF_H * S * lerp(1.0, 0.96, j);
}
function objectPose(t){
  return {
    tilt: Math.sin(t * 0.62) * 0.075 + Math.sin(t * 0.21 + 1.7) * 0.035,
    yaw: 0.94 + Math.cos(t * 0.74) * 0.045
  };
}

/* trace the lathed outline into the context, using quadratic curves */
function jarPath(t, wob){
  x.beginPath();
  const steps = 280;
  const right = [], left = [];
  for (let i = 0; i <= steps; i++){
    const u = i/steps;
    const w = 0;
    const r = (currentR(u, t) + w) * S;
    right.push([CX + r, jarY(u, t)]);
    left.push([CX - r, jarY(u, t)]);
  }
  x.moveTo(right[0][0], right[0][1]);
  for (let i = 1; i < right.length - 1; i++){
    const mx = (right[i][0] + right[i + 1][0]) / 2;
    const my = (right[i][1] + right[i + 1][1]) / 2;
    x.quadraticCurveTo(right[i][0], right[i][1], mx, my);
  }
  x.quadraticCurveTo(right.at(-1)[0], right.at(-1)[1], CX, right.at(-1)[1]);
  for (let i = left.length - 1; i > 1; i--){
    const mx = (left[i][0] + left[i - 1][0]) / 2;
    const my = (left[i][1] + left[i - 1][1]) / 2;
    x.quadraticCurveTo(left[i][0], left[i][1], mx, my);
  }
  x.quadraticCurveTo(left[0][0], left[0][1], right[0][0], right[0][1]);
  x.closePath();
}

/* ── Sparse glowing particles — visible through the translucent vessel ──
   Drift via golden-ratio phase offsets; confined inside the jar profile. */
const COLS = [
  [255, 42, 48],    // red
  [45, 126, 255],   // cobalt blue
  [255, 214, 55],   // gold
  [0, 255, 150],    // jade green
  [255, 80, 220],   // magenta
  [75, 240, 255],   // cyan
];
const P = 5, orbs = [];
for (let i = 0; i < P; i++){
  orbs.push({
    uBase: 0.18 + (i/(P-1)) * 0.64,        // spread through the vessel
    xBase: Math.cos(i * 2.39996) * 0.62,   // golden-angle horizontal home
    col:   COLS[i % COLS.length],
    f:     i * 0.6180339887,               // φ phase offset
    szb:   0.92 + (i % 3) * 0.16,
  });
}

/* ── in-flowing light motes (from TC_captojar) — spiral toward the vessel ── */
const motes = [];
for (let i = 0; i < 130; i++) motes.push(newMote(true));
function newMote(init){
  return { a: Math.random()*Math.PI*2,
           rad: init ? 1.2 + Math.random()*1.5 : 2.0 + Math.random()*0.9,
           sp: 0.003 + Math.random()*0.006,
           sz: 0.5 + Math.random()*1.7,
           warm: Math.random() < 0.7,        // most are warm porcelain dust, some colored
           ci: Math.floor(Math.random()*3),
           life: Math.random() };
}

let t0 = performance.now(), running = true;

function frame(now){
  if (!running) return;
  const t = (now - t0) / 1000;
  const breath = 1 + Math.sin(t * 0.6) * 0.012;   // slow living breath
  const pose = objectPose(t);

  x.clearRect(0, 0, W, H);
  // background warm radial
  const bg = x.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H)*0.7);
  bg.addColorStop(0, '#101015'); bg.addColorStop(1, '#08080b');
  x.fillStyle = bg; x.fillRect(0, 0, W, H);

  drawMotes(t);
  x.save();
  x.translate(CX, CY);
  x.rotate(pose.tilt);
  x.scale(pose.yaw, 1);
  x.translate(-CX, -CY);
  drawOrbsInside(t, breath);
  drawPorcelain(t, breath);
  x.restore();
  requestAnimationFrame(frame);
}

/* light spiralling inward — drawn around & into the vessel */
function drawMotes(t){
  x.globalCompositeOperation = 'lighter';
  for (const m of motes){
    m.a += m.sp; m.rad -= 0.0042; m.life += 0.01;
    if (m.rad < 0.16) Object.assign(m, newMote(false));
    const px = CX + Math.cos(m.a) * m.rad * S;
    const py = CY + Math.sin(m.a) * m.rad * S * 0.64 - 0.06 * S;
    const a = (0.45 + 0.55*Math.sin(m.life*3)) * 0.5;
    let col;
    if (m.warm) col = `rgba(245,232,205,${a})`;
    else { const c = COLS[m.ci]; col = `rgba(${c[0]},${c[1]},${c[2]},${a*0.8})`; }
    x.beginPath(); x.arc(px, py, m.sz, 0, 7); x.fillStyle = col; x.fill();
  }
  x.globalCompositeOperation = 'source-over';
}

/* orbs glow ADDITIVELY, clipped to the jar interior so light stays in the vessel */
function drawOrbsInside(t, breath){
  x.save();
  jarPath(t, true); x.clip();
  const j = jarAmount(t);
  const jelly = x.createRadialGradient(CX - S * 0.16, CY - S * 0.22, 0, CX + S * 0.05, CY + S * 0.06, S * 0.82);
  jelly.addColorStop(0, `rgba(126,242,255,${0.070 * (1 - j)})`);
  jelly.addColorStop(0.44, `rgba(255,92,210,${0.035 * (1 - j)})`);
  jelly.addColorStop(1, `rgba(30,255,160,${0.025 * (1 - j)})`);
  x.fillStyle = jelly;
  x.fillRect(0, 0, W, H);
  x.globalCompositeOperation = 'lighter';
  for (const o of orbs){
    const f = o.f;
    const pulse = 0.82 + 0.18 * Math.sin(t*1.44 + f*2.1);
    const du = Math.cos(t*0.54 + f) * Math.sin(t*0.72 + f*0.54) * 0.105;
    const dx = Math.sin(t*0.82 + f) * Math.cos(t*0.42  + f*0.72) * 0.42;
    const u = Math.max(0.07, Math.min(0.93, o.uBase + du));
    const xf = Math.max(-0.86, Math.min(0.86, o.xBase*pulse + dx));
    const half = currentR(u, t) * S;
    const px = CX + xf * half * 0.76;
    const py = jarY(u, t);
    const rad = (0.055 + 0.034 * o.szb + 0.020*pulse) * S * breath;
    const [r, g, b] = o.col;
    const grd = x.createRadialGradient(px, py, 0, px, py, rad);
    grd.addColorStop(0,   `rgba(${r},${g},${b},${0.98*pulse})`);
    grd.addColorStop(0.42,`rgba(${r},${g},${b},${0.46*pulse})`);
    grd.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    x.beginPath(); x.arc(px, py, rad, 0, 7); x.fillStyle = grd; x.fill();
  }
  x.globalCompositeOperation = 'source-over';
  x.restore();
}

function surfaceBand(u, t, alphaScale){
  const j = jarAmount(t);
  const r = currentR(u, t) * S;
  const y = jarY(u, t);
  const h = Math.max(1.2, S * 0.016 * (0.55 + Math.sin(Math.PI * u) * 0.75));
  const shade = 0.34 + 0.66 * Math.sin(Math.PI * u);
  const band = x.createLinearGradient(CX - r, y, CX + r, y);
  band.addColorStop(0.00, `rgba(48,45,42,${0.052 * shade * alphaScale})`);
  band.addColorStop(0.13, `rgba(238,234,225,${0.135 * shade * alphaScale})`);
  band.addColorStop(0.35, `rgba(255,253,247,${0.30 * shade * alphaScale})`);
  band.addColorStop(0.57, `rgba(230,229,224,${0.15 * shade * alphaScale})`);
  band.addColorStop(0.80, `rgba(138,143,148,${0.105 * alphaScale})`);
  band.addColorStop(1.00, `rgba(34,34,38,${0.085 * alphaScale})`);
  x.beginPath();
  x.ellipse(CX, y, r, h * lerp(0.78, 1.0, j), 0, 0, TAU);
  x.fillStyle = band;
  x.fill();
}

function drawMeridians(t){
  const j = jarAmount(t);
  x.save();
  jarPath(t, false);
  x.clip();
  x.globalCompositeOperation = 'screen';
  const count = 15;
  for (let k = 1; k < count; k++){
    const theta = (k / count - 0.5) * Math.PI;
    const xScale = Math.sin(theta);
    const depth = Math.cos(theta);
    const alpha = (0.018 + 0.050 * Math.max(0, depth)) * lerp(0.45, 1.0, j);
    x.beginPath();
    for (let i = 4; i <= 276; i++){
      const u = i / 280;
      const r = currentR(u, t) * S;
      const px = CX + r * xScale * 0.94;
      const py = jarY(u, t);
      i === 4 ? x.moveTo(px, py) : x.lineTo(px, py);
    }
    x.strokeStyle = `rgba(255,255,250,${alpha})`;
    x.lineWidth = depth > 0 ? 0.9 : 0.45;
    x.stroke();
  }
  x.restore();
}

function drawMouth(t){
  const j = jarAmount(t);
  if (j < 0.16) return;
  const u = 0.985;
  const y = jarY(u, t);
  const r = currentR(u, t) * S;
  const rx = r * 1.08;
  const ry = Math.max(8, rx * 0.22);

  x.save();
  x.globalAlpha = smoothstep(0.16, 0.72, j);
  x.globalCompositeOperation = 'source-over';
  x.beginPath();
  x.ellipse(CX, y + ry * 0.10, rx * 0.86, ry * 0.72, 0, Math.PI, TAU);
  x.strokeStyle = 'rgba(44,40,36,0.44)';
  x.lineWidth = Math.max(1.2, S * 0.010);
  x.stroke();

  const inner = x.createRadialGradient(CX - rx * 0.08, y - ry * 0.15, 1, CX, y, rx * 0.92);
  inner.addColorStop(0, 'rgba(245,238,222,0.22)');
  inner.addColorStop(0.42, 'rgba(38,34,32,0.42)');
  inner.addColorStop(1, 'rgba(6,6,8,0.74)');
  x.beginPath();
  x.ellipse(CX, y, rx * 0.83, ry * 0.66, 0, 0, TAU);
  x.fillStyle = inner;
  x.fill();

  x.beginPath();
  x.ellipse(CX, y + ry * 0.05, rx, ry, 0, 0, TAU);
  x.strokeStyle = 'rgba(255,251,241,0.70)';
  x.lineWidth = Math.max(1.6, S * 0.012);
  x.shadowColor = 'rgba(255,245,224,0.45)';
  x.shadowBlur = 16;
  x.stroke();
  x.shadowBlur = 0;

  x.beginPath();
  x.ellipse(CX - rx * 0.12, y - ry * 0.10, rx * 0.58, ry * 0.43, 0, Math.PI * 1.08, Math.PI * 1.88);
  x.strokeStyle = 'rgba(255,255,252,0.58)';
  x.lineWidth = Math.max(1.0, S * 0.007);
  x.stroke();
  x.restore();
}

function drawClosedBottom(t){
  const j = jarAmount(t);
  if (j < 0.05) return;
  const y = jarY(0.018, t);
  const r = currentR(0.035, t) * S;
  const ry = Math.max(6, r * lerp(0.18, 0.24, j));
  x.save();
  x.globalAlpha = smoothstep(0.05, 0.55, j);
  x.beginPath();
  x.ellipse(CX, y - ry * 0.22, r * 0.96, ry, 0, 0, TAU);
  const bottom = x.createLinearGradient(CX, y - ry, CX, y + ry);
  bottom.addColorStop(0, 'rgba(255,252,242,0.12)');
  bottom.addColorStop(0.55, 'rgba(214,218,216,0.10)');
  bottom.addColorStop(1, 'rgba(40,38,36,0.10)');
  x.fillStyle = bottom;
  x.fill();
  x.strokeStyle = 'rgba(255,248,233,0.20)';
  x.lineWidth = 1;
  x.stroke();
  x.restore();
}

function drawCapsuleGloss(t){
  const j = jarAmount(t);
  const a = 1 - smoothstep(0.22, 0.74, j);
  if (a <= 0.01) return;

  x.save();
  jarPath(t, false);
  x.clip();
  x.globalCompositeOperation = 'screen';
  x.globalAlpha = a;

  const glass = x.createLinearGradient(CX - S * 0.55, CY - S * 0.86, CX + S * 0.55, CY + S * 0.86);
  glass.addColorStop(0.00, 'rgba(255,255,255,0.00)');
  glass.addColorStop(0.18, 'rgba(255,255,255,0.28)');
  glass.addColorStop(0.25, 'rgba(255,255,255,0.05)');
  glass.addColorStop(0.62, 'rgba(150,235,255,0.12)');
  glass.addColorStop(1.00, 'rgba(255,255,255,0.00)');
  x.fillStyle = glass;
  x.fillRect(0, 0, W, H);

  x.beginPath();
  x.ellipse(CX - S * 0.22, CY - S * 0.22, S * 0.055, S * 0.62, -0.22, 0, TAU);
  x.fillStyle = 'rgba(255,255,255,0.42)';
  x.fill();

  x.beginPath();
  x.ellipse(CX + S * 0.30, CY + S * 0.12, S * 0.030, S * 0.42, -0.18, 0, TAU);
  x.fillStyle = 'rgba(170,245,255,0.18)';
  x.fill();
  x.restore();

  jarPath(t, true);
  x.save();
  x.globalAlpha = a;
  x.lineWidth = Math.max(2, S * 0.014);
  x.strokeStyle = 'rgba(255,255,255,0.66)';
  x.shadowColor = 'rgba(185,240,255,0.70)';
  x.shadowBlur = 22;
  x.stroke();
  x.restore();
}

/* the milky opaque-glass porcelain body laid over the glow */
function drawPorcelain(t, breath){
  x.save();
  const j = jarAmount(t);
  jarPath(t, true);
  const topY = jarY(1, t), botY = jarY(0, t);
  const body = x.createLinearGradient(CX - S * 0.82, topY, CX + S * 0.92, botY);
  const shell = lerp(0.24, 0.34, j);
  body.addColorStop(0.00, `rgba(255,252,245,${shell})`);
  body.addColorStop(0.23, `rgba(246,244,238,${shell * 0.79})`);
  body.addColorStop(0.55, `rgba(221,225,224,${shell * 0.59})`);
  body.addColorStop(0.79, `rgba(160,168,174,${shell * 0.56})`);
  body.addColorStop(1.00, `rgba(70,73,78,${shell * 0.44})`);
  x.fillStyle = body; x.fill();

  x.save();
  jarPath(t, false);
  x.clip();
  x.globalCompositeOperation = 'screen';
  for (let i = 8; i <= 272; i++) surfaceBand(i / 280, t, 0.50);

  const leftGlow = x.createRadialGradient(CX - S * 0.42, CY - S * 0.34, 0, CX - S * 0.42, CY - S * 0.34, S * 1.08);
  leftGlow.addColorStop(0, 'rgba(255,255,252,0.30)');
  leftGlow.addColorStop(0.30, 'rgba(252,247,237,0.10)');
  leftGlow.addColorStop(1, 'rgba(252,247,237,0)');
  x.fillStyle = leftGlow;
  x.fillRect(0, 0, W, H);

  x.globalCompositeOperation = 'multiply';
  const sideShade = x.createLinearGradient(CX - S * 0.9, CY, CX + S * 0.9, CY);
  sideShade.addColorStop(0.00, 'rgba(20,18,18,0.15)');
  sideShade.addColorStop(0.18, 'rgba(255,255,255,0.04)');
  sideShade.addColorStop(0.55, 'rgba(255,255,255,0.02)');
  sideShade.addColorStop(0.86, 'rgba(22,23,26,0.18)');
  sideShade.addColorStop(1.00, 'rgba(7,8,10,0.30)');
  x.fillStyle = sideShade;
  x.fillRect(0, 0, W, H);

  x.globalCompositeOperation = 'source-over';
  const spec = x.createLinearGradient(CX - S * 0.45, CY - S * 0.75, CX + S * 0.08, CY + S * 0.58);
  spec.addColorStop(0.00, 'rgba(255,255,255,0)');
  spec.addColorStop(0.38, 'rgba(255,255,252,0.18)');
  spec.addColorStop(0.46, 'rgba(255,255,252,0.06)');
  spec.addColorStop(1.00, 'rgba(255,255,255,0)');
  x.fillStyle = spec;
  x.beginPath();
  x.ellipse(CX - S * 0.18, CY - S * 0.10, S * 0.23, S * 0.72, -0.15, 0, TAU);
  x.fill();

  if (j > 0.18){
    x.globalAlpha = smoothstep(0.18, 0.80, j) * 0.32;
    x.beginPath();
    x.ellipse(CX, jarY(0.505, t), currentR(0.505, t) * S * 0.98, S * 0.018, 0, 0, TAU);
    x.strokeStyle = 'rgba(118,103,88,0.22)';
    x.lineWidth = 1;
    x.stroke();
    x.globalAlpha = 1;
  }
  x.restore();

  drawMeridians(t);

  jarPath(t, true);
  x.lineWidth = Math.max(1.5, S * 0.011);
  x.strokeStyle = 'rgba(255,250,240,0.44)';
  x.shadowColor = 'rgba(255,244,220,0.38)';
  x.shadowBlur = 18;
  x.stroke();
  x.shadowBlur = 0;

  drawCapsuleGloss(t);

  x.save();
  jarPath(t, false);
  x.clip();
  x.globalCompositeOperation = 'screen';
  x.beginPath();
  x.ellipse(CX - S * 0.30, CY - S * 0.26, S * 0.030, S * 0.58, -0.05, 0, TAU);
  x.fillStyle = 'rgba(255,255,255,0.15)';
  x.fill();
  x.restore();

  drawClosedBottom(t);
  drawMouth(t);
  x.restore();
}

requestAnimationFrame(frame);
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
  if (running){ t0 = performance.now() - 0; requestAnimationFrame(frame); }
});
</script>
